version: '3.8'

services:
  # --- Infrastructure ---
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: apex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-apex_saas}
    ports:
      - "5432:5432"
    volumes:
      - ./run_state/pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex -d apex_saas"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: apex-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Core trading engine (unchanged) ---
  apex:
    build: .
    container_name: apex-trading
    restart: unless-stopped
    env_file: .env
    ports:
      - "8765:8765"
      - "9108:9108"
    environment:
      - IBKR_HOST=host.docker.internal
      - IBKR_PORT=7497
      - APEX_ENVIRONMENT=staging
      - APEX_PROMETHEUS_TRADING_METRICS_ENABLED=true
      - APEX_PROMETHEUS_TRADING_METRICS_PORT=9108
      # Override .env localhost values with Docker service names
      - QUANT_DB_HOST=postgres
      - QUANT_DB_NAME=${POSTGRES_DB:-apex_saas}
      - QUANT_DB_USER=${POSTGRES_USER:-apex}
      - QUANT_DB_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
      - ./logs:/app/logs
      - ./run_state:/app/run_state
      - ./data:/app/data
    ulimits:
      nofile:
        soft: 10000
        hard: 10000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- API server (SaaS features) ---
  apex-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: apex-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-apex}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-apex_saas}
      - REDIS_URL=redis://redis:6379/0
      - APEX_AUTH_ENABLED=true
      - APEX_SECRET_KEY=${APEX_SECRET_KEY:?Set APEX_SECRET_KEY in .env}
      - APEX_METRICS_TOKEN=${APEX_METRICS_TOKEN:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - IBKR_HOST=host.docker.internal
      - IBKR_PORT=7497
      - IBKR_CLIENT_ID=400
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn api.server:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - .:/app  # Live sync for api/ and other core logic

  # --- Frontend ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apex-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - APEX_API_URL=http://apex-api:8000
      - APEX_API_BASE=http://apex-api:8000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      # Disable Turbopack — ARM64 Linux WASM fallback doesn't support createProject
      - TURBOPACK=0
    command: npm run dev
    volumes:
      - ./frontend:/app      # Live sync for React/Next.js code
      - /app/node_modules    # Preserve node_modules within container
    depends_on:
      - apex-api

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: apex-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - apex-api

  grafana:
    image: grafana/grafana:11.2.0
    container_name: apex-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  pgdata:
  redisdata:
  grafanadata:
